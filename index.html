<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>money</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Desain lingkaran persentase menggunakan conic-gradient */
        .chart-circle {
            background: conic-gradient(#ef4444 var(--p-out, 0%), #22c55e 0% var(--p-in, 0%), #e5e7eb 0%);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans max-w-md mx-auto min-h-screen shadow-lg flex flex-col justify-between">

    <!-- Header & Ringkasan -->
    <header class="bg-blue-600 text-white p-5 rounded-b-2xl sticky top-0 z-10 shadow-md">
        <h1 class="text-xl font-bold tracking-wide mb-4 text-center">money</h1>
        
        <!-- Dropdown & Edit Nama Wallet -->
        <div class="flex items-center justify-between bg-blue-700 p-2 rounded-lg mb-4">
            <select id="walletSelect" class="bg-transparent font-semibold focus:outline-none cursor-pointer text-white"></select>
            <button onclick="renameWallet()" class="text-xs bg-blue-500 hover:bg-blue-800 px-3 py-1 rounded transition">Ubah Nama</button>
        </div>

        <!-- Donut Chart & Ringkasan Angka -->
        <div class="flex items-center gap-5 bg-white/10 p-4 rounded-xl">
            <div id="chart" class="chart-circle w-20 h-20 rounded-full flex items-center justify-center transition-all duration-500 shadow-inner">
                <div class="bg-blue-600 w-14 h-14 rounded-full flex items-center justify-center text-[10px] font-bold text-white text-center shadow">
                    Rasio
                </div>
            </div>
            <div class="flex-1 space-y-1">
                <div class="text-xs text-blue-200">Total Saldo Wallet</div>
                <div id="walletBalance" class="text-xl font-black">Rp 0</div>
                <div class="flex gap-2 text-[11px] pt-1 border-t border-white/20">
                    <span class="text-green-300">▲ <span id="totalIncome">Rp 0</span></span>
                    <span class="text-red-300">▼ <span id="totalExpense">Rp 0</span></span>
                </div>
            </div>
        </div>
    </header>

    <!-- Konten Utama (Scrollable) -->
    <main class="p-4 flex-1 space-y-6 overflow-y-auto max-h-[calc(100vh-280px)]">
        
        <!-- Formulir Input Transaksi Cepat -->
        <section class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <h2 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">Catat Transaksi</h2>
            <div class="grid grid-cols-3 gap-2 mb-3">
                <button onclick="setTxType('Pemasukan')" id="btnInc" class="py-2 text-sm font-bold rounded-lg border-2 border-green-500 bg-green-50 text-green-600">Pemasukan</button>
                <button onclick="setTxType('Pengeluaran')" id="btnExp" class="py-2 text-sm font-bold rounded-lg border-2 border-transparent bg-gray-100 text-gray-500">Pengeluaran</button>
                <button onclick="setTxType('Transfer')" id="btnTrf" class="py-2 text-sm font-bold rounded-lg border-2 border-transparent bg-gray-100 text-gray-500">Transfer</button>
            </div>

            <div class="space-y-3">
                <div id="transferTargetDiv" class="hidden">
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Ke Wallet Tujuan</label>
                    <select id="targetWalletSelect" class="w-full p-2 border rounded-lg text-sm bg-gray-50"></select>
                </div>
                <input type="number" id="amount" placeholder="Jumlah (Rp)" class="w-full p-2.5 border rounded-lg text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none font-medium">
                <input type="text" id="description" placeholder="Keterangan (opsional)" class="w-full p-2.5 border rounded-lg text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none">
                <button onclick="saveTransaction()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg text-sm transition shadow-sm">Simpan Transaksi</button>
            </div>
        </section>

        <!-- Histori Transaksi -->
        <section>
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider">Riwayat Transaksi</h2>
                <button onclick="clearHistory()" class="text-xs text-red-500 hover:underline">Hapus Semua</button>
            </div>
            <div id="historyList" class="space-y-2.5">
                <!-- Data histori akan masuk di sini -->
            </div>
        </section>
    </main>

    <!-- Footer Fitur PWA -->
    <footer class="p-3 text-center text-xs text-gray-400 bg-gray-100 border-t">
        Aplikasi Berjalan Lokal & Aman • <span class="font-bold text-blue-600">money</span>
    </footer>

    <script src="app.js"></script>
    <script>
        // Registrasi Service Worker agar bisa diinstal di HP
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch",()=>{})');
        }
    </script>
</body>
</html>
